<style>
  :root {
    color-scheme: dark;
    --shift-ink: #08080b;
    --shift-ink-2: #0e0e13;
    --shift-paper: #f6f5f1;
    --shift-muted: rgba(246,245,241,0.66);
    --shift-purple: #B56BFF;
    --shift-purple-deep: #8A4DCC;

    --shift-signal: #38F4FF;
    --shift-signal-soft: rgba(56,244,255,0.16);
    --shift-signal-glow: rgba(56,244,255,0.42);
    --shift-glass: linear-gradient(180deg, rgba(15,15,22,0.72), rgba(8,8,11,0.42));
    --shift-glass-strong: linear-gradient(180deg, rgba(16,16,24,0.82), rgba(8,8,11,0.54));
    --shift-border: rgba(255,255,255,0.1);
    --shift-focus: rgba(56,244,255,0.74);
  }

  *, *::before, *::after { box-sizing: border-box; }
  img, svg, video, canvas { max-width: 100%; }

  html { scroll-padding-top: 96px; }
  html, body { background: var(--shift-ink); color: var(--shift-paper); font-family: 'Geist', system-ui, sans-serif; }
  body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow-x: hidden; }

  /* ===== Lenis smooth scroll ===== */
  html.lenis, html.lenis body { height: auto; }
  .lenis.lenis-smooth { scroll-behavior: auto !important; }
  .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
  .lenis.lenis-stopped { overflow: hidden; }

  /* ===== word-by-word text build =====
     base state is VISIBLE (fail-open): if JS/anim never runs, text still shows.
     the animation only plays once .in is added, revealing from hidden. */
  @keyframes word-in {
    from { opacity: 0; transform: translateY(0.5em); filter: blur(6px); }
    to   { opacity: 1; transform: none; filter: none; }
  }
  .build .w { display: inline-block; }
  .build.in .w { animation: word-in .7s cubic-bezier(.2,.7,.3,1) both; }
  /* hard guarantee: once "done", text is statically visible (no compositor needed) */
  .build.done .w { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; }
  @media (prefers-reduced-motion: reduce) {
    .build.in .w { animation: none; }
  }

  /* base layered background — vignette + soft purple wash + grid */
  .page-bg {
    background:
      radial-gradient(900px 560px at 82% -12%, rgba(56,244,255,0.08), transparent 58%),
      radial-gradient(1100px 700px at 80% -10%, rgba(181,107,255,0.18), transparent 60%),
      radial-gradient(800px 600px at -10% 30%, rgba(138,77,204,0.10), transparent 60%),
      radial-gradient(900px 700px at 50% 110%, rgba(181,107,255,0.10), transparent 60%),
      var(--shift-ink);
  }

  /* ===== WebGL canvas — fixed behind everything, never blocks clicks ===== */
  #webgl {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    z-index: 0; pointer-events: none; display: block;
  }
  #root { position: relative; z-index: 1; isolation: isolate; }
  #root::before {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(620px 420px at 82% 18%, rgba(56,244,255,0.06), transparent 62%),

  }

  .grid-overlay {
    position: absolute; inset: 0; pointer-events: none;
    background-image:

  .scan-line {

  @keyframes float {
    0%, 100% { transform: translateY(0); }

  }
  .floaty { animation: float 6s ease-in-out infinite; }

  @keyframes shift-loop {
    0%, 70%, 100% { transform: translate(0, 0); }
    80%           { transform: translate(2px, -1px); }
    90%           { transform: translate(-2px, 1px); }
  }
  .mark-shift .slab-top    { animation: shift-loop 5s ease-in-out infinite; transform-origin: center; }
  .mark-shift .slab-bottom { animation: shift-loop 5s ease-in-out infinite reverse; transform-origin: center; }

  @keyframes shimmer-sweep {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }
  .shimmer { position: relative; overflow: hidden; }
  .shimmer::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(110deg, transparent 30%, rgba(56,244,255,0.08) 46%, rgba(181,107,255,0.13) 54%, transparent 70%);
    transform: translateX(-100%);
  }
  .shimmer:hover::after { animation: shimmer-sweep 1.2s ease; }

  @keyframes orbit {
    from { transform: rotate(0deg) translateX(180px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(180px) rotate(-360deg); }
  }
  .orbit { animation: orbit 18s linear infinite; }
  .orbit.r2 { animation: orbit 26s linear infinite reverse; }

  @keyframes aurora {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(1.08); }
  }
  .aurora { animation: aurora 7s ease-in-out infinite; }

  @keyframes draw {
    from { stroke-dashoffset: var(--dash-len, 1000); }
    to   { stroke-dashoffset: 0; }
  }

  @keyframes travel-y {
    0%   { top: 0%; opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  .travel-dot { animation: travel-y 5s linear infinite; }

  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
  .blink { animation: blink 1s steps(1) infinite; }

  @keyframes scroll-up {
    from { transform: translateY(0); }
    to   { transform: translateY(-50%); }
  }
  .scroll-up { animation: scroll-up 22s linear infinite; }

  .marquee-slow { animation: marquee 60s linear infinite; }
  .marquee-fast { animation: marquee 24s linear infinite; }

  .grad-border { position: relative; }
  .grad-border::before {
    content: ''; position: absolute; inset: 0; padding: 1px;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(181,107,255,0.62), transparent 38%, transparent 58%, rgba(56,244,255,0.38));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
    opacity: 0.6;
  }

  .spot { position: relative; }
  .spot::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    background:
      radial-gradient(260px circle at var(--mx, 50%) var(--my, 50%), rgba(56,244,255,0.08), transparent 48%),
      radial-gradient(300px circle at var(--mx, 50%) var(--my, 50%), rgba(181,107,255,0.17), transparent 56%);
    opacity: 0; transition: opacity .3s;
  }
  .spot:hover::before { opacity: 1; }

  /* ===== cinematic scroll reveal ===== */
  .reveal { opacity: 0; transform: translateY(34px); filter: blur(8px);
    transition: opacity 1s cubic-bezier(.2,.7,.3,1), transform 1s cubic-bezier(.2,.7,.3,1), filter 1s cubic-bezier(.2,.7,.3,1); }
  .reveal.in { opacity: 1; transform: none; filter: none; }
  .reveal-up   { transform: translateY(60px); }
  .reveal-left { transform: translateX(-60px); }
  .reveal-right{ transform: translateX(60px); }
  .reveal-scale{ transform: scale(.92); }
  /* staggered children */
  .stagger > * { opacity: 0; transform: translateY(40px); filter: blur(6px);
    transition: opacity .9s cubic-bezier(.2,.7,.3,1), transform .9s cubic-bezier(.2,.7,.3,1), filter .9s cubic-bezier(.2,.7,.3,1); }
  .stagger.in > * { opacity: 1; transform: none; filter: none; }
  .stagger.in > *:nth-child(1){ transition-delay:.05s } .stagger.in > *:nth-child(2){ transition-delay:.15s }
  .stagger.in > *:nth-child(3){ transition-delay:.25s } .stagger.in > *:nth-child(4){ transition-delay:.35s }
  .stagger.in > *:nth-child(5){ transition-delay:.45s }

  .num-tag {
    font-family: 'Geist Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; color: rgba(181,107,255,0.9);
  }

  ::selection { background: var(--shift-signal); color: #041013; }

  .marquee-wrap { overflow: hidden; }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee {
    display: flex; gap: 64px; width: max-content;
    animation: marquee 38s linear infinite;
  }

  .hr-grad {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(181,107,255,0.2), rgba(56,244,255,0.18), transparent);
  }

  /* ===== 3D tilt cards ===== */
  .tilt { transition: transform .18s ease-out; will-change: transform; }

  /* ===== scroll progress bar ===== */
  #scroll-progress {
    position: fixed; top: 0; left: 0; height: 2px; width: 0%; z-index: 60;
    background: linear-gradient(90deg, var(--shift-purple-deep), var(--shift-purple), var(--shift-signal));
    box-shadow: 0 0 12px rgba(181,107,255,0.8), 0 0 18px rgba(56,244,255,0.35);
    transition: width .1s linear;
  }

  :where(a, button, [role="button"], input, textarea, select):focus-visible {
    outline: 2px solid var(--shift-focus);
    outline-offset: 4px;
    box-shadow: 0 0 0 6px rgba(56,244,255,0.12);
  }
  :where(a, button, [role="button"]) { -webkit-tap-highlight-color: rgba(56,244,255,0.16); }

  /* ===== custom cursor ===== */
  @media (hover: hover) and (pointer: fine) {
    html.cursor-ready * { cursor: none !important; }
    #cursor-dot, #cursor-ring { position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none;
      border-radius: 9999px; transform: translate(-50%, -50%); mix-blend-mode: screen; }
    #cursor-dot  { width: 7px; height: 7px; background: #B56BFF; box-shadow: 0 0 10px rgba(181,107,255,.9), 0 0 18px rgba(56,244,255,.25); }
    #cursor-ring { width: 34px; height: 34px; border: 1px solid rgba(56,244,255,.44);
      transition: width .25s, height .25s, border-color .25s, background .25s; }
    #cursor-ring.hover { width: 58px; height: 58px; border-color: rgba(181,107,255,.9); background: rgba(181,107,255,.08); box-shadow: 0 0 28px -12px rgba(56,244,255,.5); }
  }
  @media (hover: none), (pointer: coarse) {
    #cursor-dot, #cursor-ring { display: none; }
  }

  /* ===== smooth boot + "site forms in" =====
     while React/Babel compile, a breathing mark holds the screen.
     ALL motion here is transform/opacity only → runs on the GPU/compositor,
     so it stays buttery even while the main thread is busy compiling. */
  #boot { position: fixed; inset: 0; z-index: 9998; background: #08080b;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .7s ease; will-change: opacity; }
  #boot.gone { opacity: 0; pointer-events: none; }
  .boot-mark { width: 72px; height: 72px; overflow: visible;
    filter: drop-shadow(0 0 26px rgba(181,107,255,.5));   /* static glow — not animated */
    animation: boot-breathe 1.7s ease-in-out infinite; will-change: transform, opacity; }
  .boot-mark rect { fill: #B56BFF; }
  .boot-mark path { stroke: #B56BFF; }
  @keyframes boot-breathe {
    0%, 100% { transform: scale(.88); opacity: .5; }
    50%      { transform: scale(1);   opacity: 1; }
  }

  /* the actual site forms in (compositor-only, never janks) */
  #root { transition: opacity 1s ease, transform 1.1s cubic-bezier(.2,.7,.3,1); }
  html.booting #root { opacity: 0; transform: translateY(18px) scale(.99); }

  /* the 3D ambiance fades in once it's ready, a beat after the site */
  #webgl { opacity: 0; transition: opacity 1.4s ease; }
  #webgl.ready { opacity: 1; }

  @media (max-width: 767px) {
    #webgl.ready { opacity: 0.56; }

        radial-gradient(420px 260px at 86% 12%, rgba(56,244,255,0.08), transparent 64%),

    }
    .grid-overlay { opacity: 0.48; background-size: 52px 52px; }
    .glass {
      background: linear-gradient(180deg, rgba(13,13,20,0.92), rgba(8,8,11,0.78));
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 16px 50px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(20px) saturate(132%);
      -webkit-backdrop-filter: blur(20px) saturate(132%);
    }
    .glass-strong {
      background: linear-gradient(180deg, rgba(14,14,22,0.96), rgba(8,8,11,0.84));
      border-color: rgba(255,255,255,0.16);
      box-shadow: 0 20px 62px rgba(0,0,0,0.48), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .display { letter-spacing: -0.025em; text-shadow: 0 2px 34px rgba(0,0,0,0.58); }
    #root :where(p, h1, h2, h3, .font-medium, .font-semibold) { text-shadow: 0 1px 22px rgba(0,0,0,0.46); }
    #root .btn-primary,
    #root .btn-ghost { max-width: calc(100vw - 48px); }
    #root .font-mono { min-width: 0; overflow-wrap: anywhere; }
    #root .text-white\/40 { color: rgba(255,255,255,0.52); }
    #root .text-white\/45,
    #root .text-white\/50,
    #root .text-white\/55 { color: rgba(255,255,255,0.68); }
    #root .text-white\/60,
    #root .text-white\/65 { color: rgba(255,255,255,0.76); }
    #root .text-white\/75 { color: rgba(255,255,255,0.84); }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto !important; }

<body class="page-bg">

<!-- smooth boot — just a breathing mark while React compiles, then the site forms in -->
<div id="boot">
  <svg class="boot-mark" viewBox="0 0 100 100">
    <rect x="26" y="18" width="60" height="14" rx="2" />
    <path d="M38 32 L62 68" stroke-width="14" fill="none" stroke-linecap="round" />
    <rect x="14" y="68" width="60" height="14" rx="2" />
  </svg>
</div>

<!-- scroll progress + custom cursor -->
<div id="scroll-progress"></div>
<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<!-- WebGL background -->
<canvas id="webgl"></canvas>

<div id="root"></div>

<!-- boot controller (plain JS, no deps — never janks) -->
<script>
  (function () {
    var boot = document.getElementById('boot');
    var html = document.documentElement;
    var revealed = false, start = Date.now(), MIN = 650;
    function reveal() {
      if (revealed) return; revealed = true;
      html.classList.remove('booting');   // the site forms in (CSS transition on #root)
      html.classList.add('loaded');
      if (boot) boot.classList.add('gone');
    }
    function tryReveal() { var e = Date.now() - start; if (e >= MIN) reveal(); else setTimeout(reveal, MIN - e); }
    // site appears as soon as React mounts; the 3D ambiance fades in after
    window.addEventListener('shift:react-ready', tryReveal);
    window.addEventListener('shift:scene-ready', function () {
      var c = document.getElementById('webgl'); if (c) c.classList.add('ready');
    });
    // fallbacks so it can never get stuck
    window.addEventListener('load', function () { setTimeout(tryReveal, 1000); });
    setTimeout(reveal, 6000);
  })();
</script>

<script defer src="landing/sections.js"></script>
<script defer src="landing/app.js"></script>

<script type="module" src="landing/scene.js"></script>
</body>
