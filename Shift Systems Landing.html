<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Shift Systems · empresas lentas perdem dinheiro</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#08080b',
          ink2: '#0e0e13',
          purple: { DEFAULT: '#B56BFF', deep: '#8A4DCC', glow: 'rgba(181,107,255,0.55)' },
          paper: '#f6f5f1',
        },
        fontFamily: {
          sans: ['Geist', 'system-ui', 'sans-serif'],
          mono: ['Geist Mono', 'ui-monospace', 'monospace'],
        },
      }
    }
  }
</script>

<style>
  html, body { background: #08080b; color: #f6f5f1; font-family: 'Geist', system-ui, sans-serif; }
  body { -webkit-font-smoothing: antialiased; }

  /* base layered background — vignette + soft purple wash + grid */
  .page-bg {
    background:
      radial-gradient(1100px 700px at 80% -10%, rgba(181,107,255,0.18), transparent 60%),
      radial-gradient(800px 600px at -10% 30%, rgba(138,77,204,0.10), transparent 60%),
      radial-gradient(900px 700px at 50% 110%, rgba(181,107,255,0.10), transparent 60%),
      #08080b;
  }
  .grid-overlay {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  .noise {
    position: absolute; inset: 0; pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");
  }

  /* glass card */
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .glass:hover {
    border-color: rgba(181,107,255,0.35);
    background: linear-gradient(180deg, rgba(181,107,255,0.06), rgba(255,255,255,0.02));
  }
  .glass-strong {
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(16px);
  }

  /* button */
  .btn-primary {
    background: linear-gradient(180deg, #B56BFF, #8A4DCC);
    color: #0c0414;
    box-shadow: 0 12px 40px -10px rgba(181,107,255,0.55), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: transform .2s, box-shadow .2s, filter .2s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 18px 50px -10px rgba(181,107,255,0.7), inset 0 1px 0 rgba(255,255,255,0.3); filter: brightness(1.05); }
  .btn-ghost {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.12);
    color: #f6f5f1;
    transition: all .2s;
  }
  .btn-ghost:hover { background: rgba(181,107,255,0.08); border-color: rgba(181,107,255,0.4); }

  /* glow ring used behind logo / icons */
  .ring-glow { box-shadow: 0 0 60px 0 rgba(181,107,255,0.4); }

  /* underline accent */
  .accent-dot { color: #B56BFF; }

  /* eyebrow label */
  .eyebrow {
    font-family: 'Geist Mono', monospace; font-size: 11px;
    letter-spacing: 0.24em; text-transform: uppercase;
    color: #B56BFF;
  }

  /* big headline */
  .display {
    font-family: 'Geist', sans-serif;
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 0.95;
    text-wrap: balance;
  }

  /* animated diagonal lines used as background motif (echo the mark) */
  @keyframes slide-down {
    0%   { transform: translateY(-20%); opacity: 0; }
    20%  { opacity: 0.6; }
    100% { transform: translateY(120%); opacity: 0; }
  }
  .scan-line {
    position: absolute; width: 1px; height: 200px;
    background: linear-gradient(180deg, transparent, rgba(181,107,255,0.6), transparent);
    animation: slide-down 8s linear infinite;
  }

  /* float */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  .floaty { animation: float 6s ease-in-out infinite; }

  /* mark "shift" loop — slabs nudge apart then back */
  @keyframes shift-loop {
    0%, 70%, 100% { transform: translate(0, 0); }
    80%           { transform: translate(2px, -1px); }
    90%           { transform: translate(-2px, 1px); }
  }
  .mark-shift .slab-top    { animation: shift-loop 5s ease-in-out infinite; transform-origin: center; }
  .mark-shift .slab-bottom { animation: shift-loop 5s ease-in-out infinite reverse; transform-origin: center; }

  /* shimmer sweep across cards */
  @keyframes shimmer-sweep {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }
  .shimmer { position: relative; overflow: hidden; }
  .shimmer::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(110deg, transparent 30%, rgba(181,107,255,0.12) 50%, transparent 70%);
    transform: translateX(-100%);
  }
  .shimmer:hover::after { animation: shimmer-sweep 1.2s ease; }

  /* orbiting particle for hero */
  @keyframes orbit {
    from { transform: rotate(0deg) translateX(180px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(180px) rotate(-360deg); }
  }
  .orbit { animation: orbit 18s linear infinite; }
  .orbit.r2 { animation: orbit 26s linear infinite reverse; }

  /* aurora pulse */
  @keyframes aurora {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(1.08); }
  }
  .aurora { animation: aurora 7s ease-in-out infinite; }

  /* draw line on view */
  @keyframes draw {
    from { stroke-dashoffset: var(--dash-len, 1000); }
    to   { stroke-dashoffset: 0; }
  }

  /* traveling dot down a path */
  @keyframes travel-y {
    0%   { top: 0%; opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  .travel-dot { animation: travel-y 5s linear infinite; }

  /* terminal cursor */
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
  .blink { animation: blink 1s steps(1) infinite; }

  /* horizontal marquee for activity log */
  @keyframes scroll-up {
    from { transform: translateY(0); }
    to   { transform: translateY(-50%); }
  }
  .scroll-up { animation: scroll-up 22s linear infinite; }

  /* type bar marquee speed variants */
  .marquee-slow { animation: marquee 60s linear infinite; }
  .marquee-fast { animation: marquee 24s linear infinite; }

  /* gradient border via mask trick */
  .grad-border {
    position: relative;
  }
  .grad-border::before {
    content: ''; position: absolute; inset: 0; padding: 1px;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(181,107,255,0.6), transparent 40%, transparent 60%, rgba(181,107,255,0.4));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
    opacity: 0.6;
  }

  /* spotlight that follows cursor on cards */
  .spot { position: relative; }
  .spot::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    background: radial-gradient(280px circle at var(--mx, 50%) var(--my, 50%), rgba(181,107,255,0.18), transparent 50%);
    opacity: 0; transition: opacity .3s;
  }
  .spot:hover::before { opacity: 1; }

  /* reveal on scroll */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .9s cubic-bezier(.2,.7,.3,1), transform .9s cubic-bezier(.2,.7,.3,1); }
  .reveal.in { opacity: 1; transform: none; }

  /* utility */
  .num-tag {
    font-family: 'Geist Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; color: rgba(181,107,255,0.9);
  }

  /* selection */
  ::selection { background: #B56BFF; color: #0c0414; }

  /* hide scrollbar for the marquee */
  .marquee-wrap { overflow: hidden; }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee {
    display: flex; gap: 64px; width: max-content;
    animation: marquee 38s linear infinite;
  }

  /* divider gradient */
  .hr-grad {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<div id="root"></div>

<script type="text/babel" src="landing/components.jsx"></script>
<script type="text/babel" src="landing/sections.jsx"></script>
<script type="text/babel" src="landing/app.jsx"></script>
</body>
</html>
